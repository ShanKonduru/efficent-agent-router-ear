name: CI — Unit Tests & Coverage

on:
  push:
    branches: ["master", "main", "feature/**", "fix/**"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "pytest · Python ${{ matrix.python-version }} · ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with branch coverage
        env:
          OPENROUTER_API_KEY: sk-or-test-key-ci
        run: >
          python -m pytest tests/
          --cov=ear
          --cov-branch
          --cov-fail-under=100
          --cov-report=term-missing
          --cov-report=xml:coverage_reports/coverage.xml
          --cov-report=json:coverage_reports/coverage.json
          -v

      - name: Upload coverage XML (Codecov)
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          files: coverage_reports/coverage.xml
          fail_ci_if_error: false

      - name: Upload coverage artefact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage_reports/
          retention-days: 30
