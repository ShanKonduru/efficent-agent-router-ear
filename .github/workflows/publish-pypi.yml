name: Publish - PyPI (Production Release)

# Publishes to PyPI on every push of a stable version tag:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Required repository secret:
#   PYPI_API_TOKEN — token from https://pypi.org/manage/account/token/
#                    Scope: "Entire account" OR scoped to this project.
#
# OIDC trusted publishing is preferred over API tokens.
# Configure via: https://pypi.org/manage/project/efficient-agent-router-ear/settings/publishing/
#
# After publishing:
#   pip install efficient-agent-router-ear==<version>

on:
  push:
    tags:
      # Only version-like tags trigger PyPI. Final validation happens in verify-version-tag.
      - "v*.*.*"
      - "*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build wheel but skip upload"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write   # To create a GitHub Release
  id-token: write   # For OIDC trusted publishing

jobs:
  verify-version-tag:
    name: Verify tag matches project version
    runs-on: ubuntu-latest
    outputs:
      version_match: ${{ steps.verify.outputs.version_match }}
      project_version: ${{ steps.verify.outputs.project_version }}
      tag_version: ${{ steps.verify.outputs.tag_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag and pyproject version match
        id: verify
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "version_match=false" >> "$GITHUB_OUTPUT"
            echo "project_version=" >> "$GITHUB_OUTPUT"
            echo "tag_version=" >> "$GITHUB_OUTPUT"
            echo "This workflow publishes only from version tags (X.Y.Z or vX.Y.Z)."
            exit 1
          fi

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "${TAG_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version_match=false" >> "$GITHUB_OUTPUT"
            echo "project_version=" >> "$GITHUB_OUTPUT"
            echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Tag must be semantic version X.Y.Z or vX.Y.Z."
            exit 1
          fi

          PROJECT_VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["project"]["version"])
          PY
          )

          echo "project_version=${PROJECT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"

          if [[ "${PROJECT_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "version_match=false" >> "$GITHUB_OUTPUT"
            echo "Tag version (${TAG_VERSION}) does not match pyproject version (${PROJECT_VERSION})."
            exit 1
          fi

          echo "version_match=true" >> "$GITHUB_OUTPUT"

  # --------------------------------------------------------------------------
  # Job 1: Run full test suite (mandatory gate before release)
  # --------------------------------------------------------------------------
  test-gate:
    name: Test gate (must pass before publish)
    runs-on: ubuntu-latest
    needs: verify-version-tag
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with strict 100% coverage gate
        env:
          OPENROUTER_API_KEY: sk-or-test-key-ci
        run: >
          python -m pytest tests/
          --cov=ear
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
          -v

  # --------------------------------------------------------------------------
  # Job 2: Build and publish
  # --------------------------------------------------------------------------
  build-and-publish-pypi:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    needs: test-gate
    environment: pypi   # Configure this GitHub environment with required reviewers

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build toolchain
        run: pip install build twine

      - name: Build source distribution and wheel
        run: python -m build

      - name: Verify distributions
        run: |
          ls -lh dist/
          python -m twine check --strict dist/*

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist-pypi
          path: dist/
          retention-days: 90

      - name: Publish to PyPI (OIDC — preferred)
        if: ${{ github.event.inputs.dry_run != 'true' && needs['verify-version-tag'].outputs.version_match == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
        # If you are NOT using OIDC trusted publishing, uncomment the next two lines
        # and remove the id-token: write permission above:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}

      # --------------------------------------------------------------------------
      # Create a GitHub Release with the built assets attached
      # --------------------------------------------------------------------------
      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry_run != 'true' && needs['verify-version-tag'].outputs.version_match == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          name: "EAR ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
