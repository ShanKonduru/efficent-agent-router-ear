name: Publish - TestPyPI (Check-in)

# Publishes to TestPyPI on every check-in (push) when tests pass with 100% coverage.
#
# Required repository secret:
#   TEST_PYPI_API_TOKEN — token from https://test.pypi.org/manage/account/token/
#                         Scope: "Entire account" OR scoped to this project.
#
# After publishing:
#   pip install -i https://test.pypi.org/simple/ efficient-agent-router-ear==<version>

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build wheel but skip upload"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read
  id-token: write   # Needed for OIDC trusted publishing

jobs:
  test-gate:
    name: Test gate (must pass before TestPyPI publish)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with strict 100% coverage gate
        env:
          OPENROUTER_API_KEY: sk-or-test-key-ci
        run: >
          python -m pytest tests/
          --cov=ear
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
          -v

  build-and-publish-testpypi:
    name: Build & publish to TestPyPI
    runs-on: ubuntu-latest
    needs: test-gate
    environment: testpypi   # Optional: configure as a GitHub environment with protection rules
    env:
      TEST_PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so setuptools-scm can compute version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build toolchain
        run: pip install build twine

      - name: Build source distribution and wheel
        run: python -m build

      - name: Inspect built distributions
        run: |
          ls -lh dist/
          python -m twine check dist/*

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist-testpypi
          path: dist/
          retention-days: 14

      - name: Publish to TestPyPI (OIDC)
        if: github.event.inputs.dry_run != 'true' && env.TEST_PYPI_API_TOKEN == ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          verbose: true

      - name: Publish to TestPyPI (API token)
        if: github.event.inputs.dry_run != 'true' && env.TEST_PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ env.TEST_PYPI_API_TOKEN }}
          skip-existing: true
          verbose: true
